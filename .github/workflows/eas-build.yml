name: EAS Mobile Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - development
          - production
      platform:
        description: 'Target platform(s)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build (iOS + Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Default to PREVIEW for both platforms. Preview builds are
      # internal-distribution, NON-development-client release builds
      # (eas.json `preview` profile: developmentClient=false). A push to main
      # must never produce a development build.
      - name: EAS Build
        working-directory: mobile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          echo "Building profile: $PROFILE  platform: $PLATFORM"
          eas build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive \
            --json \
            --no-wait \
            | tee /tmp/build-output.json
          echo "### Mobile Build Queued" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** $PROFILE" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** $PLATFORM" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PY' >> $GITHUB_STEP_SUMMARY
          import json
          with open('/tmp/build-output.json') as f:
              builds = json.load(f)
          for b in builds:
              plat = b.get('platform', '?')
              url = b.get('buildDetailsPageUrl', '')
              print(f"- **{plat}:** {url}")
          print("")
          print("Install link appears on each build page once it finishes (~10–20 min).")
          PY
