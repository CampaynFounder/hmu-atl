name: Deploy → Staging

# Auto-deploys main to hmu-atl-staging once CI (typecheck + test) passes.
# CI failures block the deploy because workflow_run only fires when the
# referenced workflow concludes; we additionally gate on `success` below.
#
# Why GH Actions does not write .env.local in CI: that's the bake pattern
# that caused the 2026-05-06 leak. NEXT_PUBLIC_* values are passed via
# build-time env: only; everything else is supplied by `wrangler secret put`
# on the Worker at runtime.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to hmu-atl-staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: staging
      url: https://staging.hmucashride.com
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Capture deploy timestamp
        id: stamp
        run: echo "time=$(date -u +%FT%TZ)" >> $GITHUB_OUTPUT

      - name: Build (Next.js → OpenNext → Cloudflare Worker)
        env:
          # Deploy stamps — embedded in the client bundle so the admin badge
          # can show what's running. Time is captured per-run so a
          # workflow_dispatch redeploy of the same SHA still updates "X min ago".
          NEXT_PUBLIC_DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          NEXT_PUBLIC_DEPLOY_TIME: ${{ steps.stamp.outputs.time }}
          NEXT_PUBLIC_DEPLOY_ENV: staging
          # Build-time NEXT_PUBLIC_* — staging values from the `staging`
          # GitHub Environment. Server-only secrets are NOT baked here;
          # they live on the Worker via `wrangler secret put`.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_DOMAIN: ${{ secrets.NEXT_PUBLIC_CLERK_DOMAIN }}
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /auth-callback
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /auth-callback
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY: ${{ secrets.NEXT_PUBLIC_ABLY_SUBSCRIBE_KEY }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
          NEXT_PUBLIC_APP_URL: https://staging.hmucashride.com
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # Sentry sourcemap upload — runs during `next build` via withSentryConfig.
          # Auth token must NEVER appear in .env.local (opennextjs bakes that into
          # the worker bundle). Org + project are non-sensitive build-time inputs.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Server-side placeholders. Real values come from `wrangler secret`
          # at runtime; these only exist to satisfy SDK constructors that
          # instantiate at module load. Same shape as local .env.local.
          DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder?sslmode=disable
          DATABASE_URL_UNPOOLED: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder?sslmode=disable
          STRIPE_SECRET_KEY: sk_test_REPLACE_ME
          STRIPE_WEBHOOK_SECRET: whsec_REPLACE_ME
          STRIPE_MOCK: 'false'
          STRIPE_PLATFORM_ACCOUNT_ID: acct_REPLACE_ME
          HMU_FIRST_PRICE_ID: price_REPLACE_ME
          CASH_PACK_10_PRICE_ID: price_REPLACE_ME
          CASH_PACK_25_PRICE_ID: price_REPLACE_ME
          CLERK_SECRET_KEY: REPLACE_ME
          CLERK_WEBHOOK_SECRET: REPLACE_ME
          ABLY_API_KEY: REPLACE_ME
          OPENAI_API_KEY: REPLACE_ME
          META_CONVERSIONS_API_TOKEN: REPLACE_ME
          META_DATASET_ID: '4294459890828911'
        run: npx opennextjs-cloudflare build

      - name: Deploy to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.staging.jsonc

      - name: Sync runtime secrets to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          sync_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "⚠️  $name is empty — skipping"
              return
            fi
            echo "$value" | npx wrangler secret put "$name" --config wrangler.staging.jsonc
            echo "✓ $name"
          }
          sync_secret DATABASE_URL              "${{ secrets.DATABASE_URL }}"
          sync_secret DATABASE_URL_UNPOOLED     "${{ secrets.DATABASE_URL_UNPOOLED }}"
          sync_secret CLERK_SECRET_KEY          "${{ secrets.CLERK_SECRET_KEY }}"
          sync_secret CLERK_WEBHOOK_SECRET      "${{ secrets.CLERK_WEBHOOK_SECRET }}"
          sync_secret STRIPE_SECRET_KEY         "${{ secrets.STRIPE_SECRET_KEY }}"
          sync_secret STRIPE_WEBHOOK_SECRET     "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          sync_secret STRIPE_PLATFORM_ACCOUNT_ID "${{ secrets.STRIPE_PLATFORM_ACCOUNT_ID }}"
          sync_secret HMU_FIRST_PRICE_ID        "${{ secrets.HMU_FIRST_PRICE_ID }}"
          sync_secret ABLY_API_KEY              "${{ secrets.ABLY_API_KEY }}"
          sync_secret TWILIO_ACCOUNT_SID        "${{ secrets.TWILIO_ACCOUNT_SID }}"
          sync_secret TWILIO_AUTH_TOKEN         "${{ secrets.TWILIO_AUTH_TOKEN }}"
          sync_secret TWILIO_PHONE_NUMBER       "${{ secrets.TWILIO_PHONE_NUMBER }}"
          sync_secret TWILIO_VERIFY_SERVICE_SID "${{ secrets.TWILIO_VERIFY_SERVICE_SID }}"
          sync_secret UPSTASH_REDIS_REST_URL    "${{ secrets.UPSTASH_REDIS_REST_URL }}"
          sync_secret UPSTASH_REDIS_REST_TOKEN  "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          sync_secret OPENAI_API_KEY            "${{ secrets.OPENAI_API_KEY }}"
          sync_secret META_CONVERSIONS_API_TOKEN "${{ secrets.META_CONVERSIONS_API_TOKEN }}"
          sync_secret VOIPMS_API_USERNAME       "${{ secrets.VOIPMS_API_USERNAME }}"
          sync_secret VOIPMS_API_PASSWORD       "${{ secrets.VOIPMS_API_PASSWORD }}"
          sync_secret SMOKE_WEBHOOK_SECRET      "${{ secrets.SMOKE_WEBHOOK_SECRET }}"

      - name: Apply schema migrations to staging DB
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          node scripts/apply-migration.mjs lib/db/migrations/voip-debug-logging.sql
          node scripts/apply-migration.mjs lib/db/migrations/rider-payment-methods.sql
          node scripts/apply-migration.mjs lib/db/migrations/2026-05-18-one-active-blast-per-rider.sql
          node scripts/apply-migration.mjs lib/db/migrations/2026-05-18-driver-location-sharing.sql
          node scripts/apply-migration.mjs lib/db/migrations/2026-05-18-blast-matching-home-fallback.sql
          node scripts/apply-migration.mjs lib/db/migrations/2026-05-20-public-blast-drafts.sql
          node scripts/apply-migration.mjs sql/007b_comments_base.sql
          node scripts/apply-migration.mjs sql/008_comments_v2.sql
          node scripts/apply-migration.mjs sql/009_comments_config.sql
          node scripts/apply-migration.mjs lib/db/migrations/comments-add-deleted-at.sql
          node scripts/apply-migration.mjs lib/db/migrations/2026-05-25-user-delete-fk-cleanup.sql

      - name: Post-deploy health check
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              https://staging.hmucashride.com/api/health || echo "000")
            if [[ "$CODE" == "200" ]]; then
              cat /tmp/health.json
              echo ""
              echo "✓ Staging healthy"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE — retrying in 10s..."
            sleep 10
          done
          echo "✗ Staging health check failed after 5 attempts"
          cat /tmp/health.json || true
          exit 1
